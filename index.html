<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tank Battle - Power-up Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #050505; color: #00f2ff; text-align: center; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; }
        #menu, #gameOver { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #gameOver { display: none; }
        button { padding: 15px 40px; margin: 15px; font-size: 18px; cursor: pointer; background: transparent; color: #00f2ff; border: 2px solid #00f2ff; border-radius: 0; transition: 0.3s; text-transform: uppercase; letter-spacing: 3px; box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 30px #00f2ff; }
        canvas { background: #000; border: 2px solid #00f2ff; display: block; margin: 10px auto; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); }
        .ui { background: rgba(0,0,0,0.8); padding: 15px; display: flex; justify-content: center; gap: 100px; font-size: 20px; border-bottom: 1px solid #00f2ff; }
        .hp-bar { width: 100px; height: 10px; background: #222; border: 1px solid #00f2ff; display: inline-block; position: relative; }
        .hp-fill { height: 100%; transition: 0.5s; }
        .winner-text { font-size: 60px; color: #fff; text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 70px; margin-bottom: 10px; letter-spacing: 10px;">CYBER TANKS</h1>
        <p style="color: #00f2ff; opacity: 0.7;">POWER-UP PROTOCOL v4.0</p>
        <button id="btn2P">Initialize 2P</button>
        <button id="btnAI">Neural AI Match</button>
    </div>

    <div id="gameOver">
        <div id="winnerText" class="winner-text"></div>
        <button onclick="location.reload()">Reboot System</button>
    </div>

    <div class="ui">
        <div>P1 <div class="hp-bar"><div id="hp1" class="hp-fill" style="width:100%; background:#ff0055;"></div></div></div>
        <div id="mapName" style="color:#00f2ff; font-size: 14px; align-self: center;">WAITING FOR SCAN...</div>
        <div>P2 <div class="hp-bar"><div id="hp2" class="hp-fill" style="width:100%; background:#00f2ff;"></div></div></div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const keys = new Map();
            let isGameRunning = false, playWithAI = false;
            let bullets = [], currentWalls = [], gridDots = [], powerUps = [];
            let shakeTime = 0, powerUpTimer = 0;

            const mapLibrary = [
                { name: "NEON_CIRCUIT", walls: [{x: 0, y: 290, w: 120, h: 20}, {x: 680, y: 290, w: 120, h: 20}, {x: 390, y: 0, w: 20, h: 150}, {x: 390, y: 450, w: 20, h: 150}] },
                { name: "CORE_ACCESS", walls: [{x: 200, y: 150, w: 20, h: 300}, {x: 580, y: 150, w: 20, h: 300}, {x: 350, y: 280, w: 100, h: 40}] }
            ];

            const PU_TYPES = [
                { type: 'HP', color: '#00ff66', label: '+' }, // Hồi máu
                { type: 'SPEED', color: '#ffcc00', label: '>>' }, // Tăng tốc
                { type: 'FIRE', color: '#cc00ff', label: '!!' } // Bắn nhanh
            ];

            function playSound(freq, type='square', duration=0.2, volume=0.05) {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = type; osc.frequency.value = freq;
                    g.gain.setValueAtTime(volume, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    osc.connect(g); g.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + duration);
                } catch(e) {}
            }

            class Tank {
                constructor(x, y, color, controls, name) {
                    this.x = x; this.y = y; this.color = color;
                    this.angle = (name === "P2") ? Math.PI : 0; 
                    this.hp = 3; this.controls = controls; this.name = name;
                    this.lastShot = 0;
                    this.speedBoost = 0;
                    this.fireBoost = 0;
                }
                
                update() {
                    let vx = 0, vy = 0;
                    if (playWithAI && this.name === "P2") {
                        if(Math.random() < 0.05) this.aiDir = { vx: (p1.x > this.x ? 1 : -1), vy: (p1.y > this.y ? 1 : -1) };
                        vx = this.aiDir?.vx || -1; vy = this.aiDir?.vy || 0;
                        if(Math.random() < 0.03) this.shoot();
                    } else {
                        if (keys.get(this.controls.up)) vy -= 1; if (keys.get(this.controls.down)) vy += 1;
                        if (keys.get(this.controls.left)) vx -= 1; if (keys.get(this.controls.right)) vx += 1;
                        if (keys.get(this.controls.fire)) this.shoot();
                    }

                    if (vx !== 0 || vy !== 0) {
                        this.angle = Math.atan2(vy, vx);
                        let currentSpeed = (this.speedBoost > 0) ? 6 : 3.5;
                        let nx = this.x + vx * currentSpeed, ny = this.y + vy * currentSpeed;
                        if (nx > 25 && nx < 775 && ny > 25 && ny < 575 && !this.checkWall(nx, ny)) {
                            this.x = nx; this.y = ny;
                        }
                    }

                    if (this.speedBoost > 0) this.speedBoost--;
                    if (this.fireBoost > 0) this.fireBoost--;
                }

                shoot() {
                    let delay = (this.fireBoost > 0) ? 150 : 400;
                    if (Date.now() - this.lastShot > delay) {
                        playSound(600, 'sine', 0.1, 0.08);
                        bullets.push(new Bullet(this.x, this.y, this.angle, this));
                        this.lastShot = Date.now();
                    }
                }

                checkWall(nx, ny) { return currentWalls.some(w => nx+18 > w.x && nx-18 < w.x+w.w && ny+18 > w.y && ny-18 < w.y+w.h); }

                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    // Hiệu ứng phát sáng khi có buff
                    ctx.shadowBlur = (this.speedBoost > 0 || this.fireBoost > 0) ? 30 : 15;
                    ctx.shadowColor = (this.speedBoost > 0) ? "#ffcc00" : (this.fireBoost > 0 ? "#cc00ff" : this.color);
                    ctx.strokeStyle = ctx.shadowColor;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-15, -12, 30, 24);
                    ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(-15, -12, 30, 24);
                    ctx.fillStyle = ctx.strokeStyle; ctx.fillRect(10, -2, 18, 4);
                    ctx.beginPath(); ctx.arc(0,0, 8, 0, Math.PI*2); ctx.stroke();
                    ctx.restore();
                }
            }

            class Bullet {
                constructor(x, y, angle, owner) { this.x = x; this.y = y; this.angle = angle; this.owner = owner; this.active = true; }
                update() {
                    this.x += Math.cos(this.angle) * 11; this.y += Math.sin(this.angle) * 11;
                    if (this.x<0 || this.x>800 || this.y<0 || this.y>600 || currentWalls.some(w => this.x>w.x && this.x<w.x+w.w && this.y>w.y && this.y<w.y+w.h)) {
                        this.active = false;
                    }
                }
            }

            class PowerUp {
                constructor() {
                    let config = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
                    this.type = config.type; this.color = config.color; this.label = config.label;
                    this.x = 100 + Math.random() * 600; this.y = 100 + Math.random() * 400;
                    this.active = true; this.pulse = 0;
                }
                draw() {
                    this.pulse += 0.1;
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.shadowBlur = 15 + Math.sin(this.pulse) * 10;
                    ctx.shadowColor = this.color;
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-12, -12, 24, 24);
                    ctx.fillStyle = "white"; ctx.font = "bold 14px Orbitron";
                    ctx.fillText(this.label, -8, 6);
                    ctx.restore();
                }
            }

            let p1, p2;

            function spawnPowerUp() {
                if (isGameRunning) powerUps.push(new PowerUp());
            }

            function startGame(ai) {
                p1 = new Tank(150, 300, "#ff0055", {up:'KeyW', down:'KeyS', left:'KeyA', right:'KeyD', fire:'Space'}, "P1");
                p2 = new Tank(650, 300, "#00f2ff", {up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight', fire:'Enter'}, "P2");
                playWithAI = ai; isGameRunning = true;
                const m = mapLibrary[Math.floor(Math.random() * mapLibrary.length)];
                currentWalls = m.walls;
                document.getElementById('mapName').innerText = "SECTOR: " + m.name;
                document.getElementById('menu').style.display = 'none';
                setInterval(spawnPowerUp, 5000); // 5 giây một lần
                loop();
            }

            function loop() {
                if (!isGameRunning) return;
                ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 600);

                // Vẽ tường
                currentWalls.forEach(w => {
                    ctx.shadowBlur = 10; ctx.shadowColor = "#00f2ff";
                    ctx.strokeStyle = "#00f2ff"; ctx.strokeRect(w.x, w.y, w.w, w.h);
                });

                // Xử lý vật phẩm
                powerUps = powerUps.filter(pu => {
                    pu.draw();
                    let collected = false;
                    [p1, p2].forEach(p => {
                        if (Math.hypot(p.x - pu.x, p.y - pu.y) < 30) {
                            playSound(800, 'sine', 0.2, 0.1);
                            if (pu.type === 'HP') { p.hp = Math.min(3, p.hp + 1); document.getElementById('hp'+(p===p1?1:2)).style.width = (p.hp*33.3) + "%"; }
                            if (pu.type === 'SPEED') p.speedBoost = 300; // ~5 giây
                            if (pu.type === 'FIRE') p.fireBoost = 300;
                            collected = true;
                        }
                    });
                    return !collected;
                });

                // Xử lý đạn
                bullets = bullets.filter(b => {
                    b.update();
                    if (b.active) {
                        ctx.shadowBlur = 20; ctx.shadowColor = b.owner.color;
                        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, 7); ctx.fill();
                        let enemy = (b.owner === p1) ? p2 : p1;
                        if (Math.hypot(b.x - enemy.x, b.y - enemy.y) < 22) {
                            enemy.hp--;
                            document.getElementById('hp'+(enemy===p1?1:2)).style.width = (enemy.hp*33.3) + "%";
                            if (enemy.hp <= 0) {
                                isGameRunning = false;
                                document.getElementById('gameOver').style.display = 'flex';
                                document.getElementById('winnerText').innerText = b.owner.name + " WINS";
                                document.getElementById('winnerText').style.color = b.owner.color;
                            }
                            return false;
                        }
                    }
                    return b.active;
                });

                [p1, p2].forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(loop);
            }

            window.addEventListener('keydown', e => { keys.set(e.code, true); if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space","Enter"].includes(e.code)) e.preventDefault(); });
            window.addEventListener('keyup', e => keys.set(e.code, false));
            document.getElementById('btn2P').onclick = () => startGame(false);
            document.getElementById('btnAI').onclick = () => startGame(true);
        };
    </script>
</body>
</html>
